<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="/css/styles.css" />
    <script src="/js/app_index.js" defer></script>
  </head>
  <body>
    <main class="calendar">
      <div class="container">
        <ul class="months">
          <li data-month="jan">
            JAN
            <span class="note-count"></span>
          </li>
          <li class="has-note" data-month="feb">
            FEB
            <span class="note-count">1</span>
          </li>
          <li data-month="mar">
            MAR
            <span class="note-count"></span>
          </li>
          <li data-month="apr">
            APR
            <span class="note-count"></span>
          </li>
          <li data-month="may">
            MAY
            <span class="note-count"></span>
          </li>
          <li data-month="jun">
            JUN
            <span class="note-count"></span>
          </li>
          <li data-month="jul">
            JUL
            <span class="note-count"></span>
          </li>
          <li data-month="aug">
            AUG
            <span class="note-count"></span>
          </li>
          <li data-month="sep">
            SEP
            <span class="note-count"></span>
          </li>
          <li data-month="oct">
            OCT
            <span class="note-count"></span>
          </li>
          <li data-month="nov">
            NOV
            <span class="note-count"></span>
          </li>
          <li data-month="dec">
            DEC
            <span class="note-count"></span>
          </li>
        </ul>
      </div>
    </main>
  </body>
</html>
